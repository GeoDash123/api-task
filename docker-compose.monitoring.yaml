services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - red-monitoreo
    ports:
      - 9090:9090
  loki:
    image: grafana/loki:latest
    networks:
      - red-monitoreo
    ports:
      - 3100:3100
  grafana:
    image: grafana/grafana:latest
    networks:
      - red-monitoreo
    ports:
      - 3000:3000

networks:
  red-monitoreo:
    name: red-compartida-global
    external: true